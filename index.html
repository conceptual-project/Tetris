        <title>Tetris</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            body {
                background: #0d0d0d;
                color: #fff;
                font-family: "Courier New", Courier, monospace;
                user-select: none;
                min-height: 100vh;
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 16px;
                padding: 16px;
            }
            .top-bar {
                display: flex;
                align-items: flex-end;
                justify-content: center;
                width: 100%;
                position: relative;
            }
            .title-row {
                display: flex;
                align-items: flex-end;
                justify-content: center;
                gap: 6px;
                will-change: filter;
                animation: titleGlow 3s ease-in-out infinite;
            }
            .btn-row {
                display: flex;
                gap: 6px;
            }
            .tbtn {
                flex: 1;
                background: rgba(255, 255, 255, 0.05);
                border: 1px solid rgba(255, 255, 255, 0.1);
                border-radius: 6px;
                color: #888;
                font-family: inherit;
                font-size: 0.6rem;
                font-weight: bold;
                letter-spacing: 0.08em;
                padding: 6px 0;
                cursor: pointer;
                transition: background 0.15s, color 0.15s;
                text-align: center;
            }
            .tbtn:hover {
                background: rgba(255, 255, 255, 0.1);
                color: #ccc;
            }
            .tbtn.sound-on {
                background: rgba(200, 168, 232, 0.08);
                border-color: rgba(200, 168, 232, 0.2);
                color: #c8a8e8;
            }
            .tbtn.sound-off {
                background: rgba(255, 255, 255, 0.05);
                border-color: rgba(255, 255, 255, 0.1);
                color: #666;
            }
            .title-letter {
                display: grid;
                grid-template-columns: repeat(5, 8px);
                gap: 1px;
            }
            .title-letter .px {
                width: 8px;
                height: 8px;
                border-radius: 1.5px;
            }
            .main-row {
                display: flex;
                gap: 24px;
                align-items: flex-start;
            }
            table {
                width: 100%;
                border-collapse: collapse;
            }
            th {
                font-size: 0.5rem;
                color: #555;
                text-transform: uppercase;
                letter-spacing: 0.1em;
                border-bottom: 1px solid #333;
                text-align: left;
                padding: 2px 4px;
            }
            td {
                font-size: 0.6rem;
                color: #888;
                padding: 2px 4px;
                border-bottom: 1px solid #1a1a1a;
            }
            tr.highlight td {
                color: #fff;
                font-weight: bold;
            }
            .board-wrap {
                position: relative;
            }
            .board-wrap canvas {
                display: block;
                border-radius: 4px;
                cursor: pointer;
            }
            .gp-indicator {
                position: absolute;
                top: 8px;
                left: 8px;
                z-index: 15;
                pointer-events: none;
                font-size: 0.55rem;
                color: #888;
            }
            .bonus-popup {
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                z-index: 20;
                pointer-events: none;
                font-weight: bold;
                white-space: nowrap;
                font-size: 1.6rem;
                color: #fff;
                text-shadow:
                    0 0 3px rgba(0, 0, 0, 1),
                    2px 2px 4px rgba(0, 0, 0, 0.9),
                    -2px -2px 4px rgba(0, 0, 0, 0.9),
                    0 0 18px rgba(255, 200, 120, 0.7),
                    0 0 40px rgba(255, 180, 100, 0.35);
                display: none;
            }
            .overlay {
                position: absolute;
                inset: 0;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                z-index: 10;
                border-radius: 4px;
                background: rgba(10, 10, 10, 0.72);
                backdrop-filter: blur(6px);
            }
            .overlay h2 {
                font-size: 1.2rem;
                margin-bottom: 8px;
            }
            .overlay p {
                font-size: 0.7rem;
                margin-bottom: 8px;
                color: #ccc;
            }
            .overlay .hint {
                font-size: 0.6rem;
                color: #666;
            }
            .overlay-btn {
                padding: 12px 32px;
                border: none;
                font-weight: bold;
                cursor: pointer;
                border-radius: 8px;
                background: linear-gradient(135deg, #c8a8e8, #a8c8e8);
                color: #1a1a2e;
                font-family: inherit;
                font-size: 1.1rem;
                box-shadow: 0 2px 12px rgba(200, 168, 232, 0.3);
                transition: transform 0.15s;
            }
            .overlay-btn:hover {
                transform: scale(1.05);
            }
            .right-panel {
                display: flex;
                flex-direction: column;
                gap: 10px;
                min-width: 150px;
            }
            .stat-box {
                border-radius: 6px;
                padding: 10px;
                background: rgba(20, 20, 30, 0.75);
                border: 1px solid rgba(255, 255, 255, 0.08);
            }
            .stat-box .label {
                text-transform: uppercase;
                font-size: 0.65rem;
                color: #888;
                letter-spacing: 0.15em;
                margin-bottom: 2px;
            }
            .stat-box .value {
                font-weight: bold;
                font-size: 1.1rem;
                color: #fff;
            }
            .stat-box .value.purple {
                color: #c8a8e8;
            }
            .stat-box .value.green {
                color: #a8e8c8;
            }
            .tbtn.pause-on {
                background: rgba(200, 168, 232, 0.08);
                border-color: rgba(200, 168, 232, 0.2);
                color: #c8a8e8;
            }

            .gameover-table {
                width: 80%;
                max-width: 280px;
                max-height: 220px;
                overflow-y: auto;
                margin-bottom: 12px;
                scrollbar-width: thin;
                scrollbar-color: rgba(200, 168, 232, 0.3) transparent;
            }
            .gameover-table table th {
                font-size: 0.6rem;
                color: #777;
                border-color: #333;
            }
            .gameover-table table td {
                font-size: 0.7rem;
                color: #bbb;
                border-color: #222;
            }
            .gameover-table table tr.highlight td {
                color: #fff;
                font-weight: bold;
            }
            @keyframes pulse {
                0%,
                100% {
                    opacity: 1;
                }
                50% {
                    opacity: 0.4;
                }
            }
            @keyframes titleGlow {
                0%,
                100% {
                    filter: drop-shadow(0 0 8px rgba(200, 168, 232, 0.4))
                        drop-shadow(0 0 20px rgba(200, 168, 232, 0.2));
                }
                50% {
                    filter: drop-shadow(0 0 14px rgba(200, 168, 232, 0.6))
                        drop-shadow(0 0 30px rgba(200, 168, 232, 0.3));
                }
            }
            .pulse-anim {
                animation: pulse 1s ease-in-out infinite;
            }
        </style>
    </head>

            // ═══════════════════════════════════════════
            // SOUND SYSTEM (from cubefall)
            // ═══════════════════════════════════════════
            let audioCtx = null;

            function createAudioCtx() {
                try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) { audioCtx = null; G.soundOn = false; }
                if (audioCtx) {
                    audioCtx.onstatechange = function() {
                        if (audioCtx && audioCtx.state === 'interrupted') audioCtx.resume().catch(function(){});
                    };
                }
            }

            function initAudio() {
                if (!audioCtx && G.soundOn) {
                    createAudioCtx();
                }
                if (audioCtx) {
                    if (audioCtx.state === 'suspended' || audioCtx.state === 'interrupted') {
                        audioCtx.resume().catch(function(){});
                    } else if (audioCtx.state === 'closed') {
                        audioCtx = null; createAudioCtx();
                    }
                }
            }

            function playTone(freq, duration, volume, type) {
                if (!G.soundOn) return;
                if (!audioCtx || audioCtx.state === 'closed') { audioCtx = null; createAudioCtx(); }
                if (!audioCtx) return;
                if (audioCtx.state === 'suspended' || audioCtx.state === 'interrupted') {
                    audioCtx.resume().catch(function(){});
                }
                try {
                    var osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
                    osc.type = type || 'sine'; osc.frequency.value = freq;
                    var v = Math.min(volume, 0.3);
                    gain.gain.setValueAtTime(v, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
                    osc.connect(gain); gain.connect(audioCtx.destination);
                    osc.start(audioCtx.currentTime); osc.stop(audioCtx.currentTime + duration);
                } catch(e) { audioCtx = null; createAudioCtx(); }
            }

            // Resume audio after system wake-up or tab focus
            document.addEventListener('visibilitychange', function() {
                if (!document.hidden) initAudio();
            });
            window.addEventListener('pageshow', function() { initAudio(); });

            function t(key) {

            const SRS_JLSTZ = {

            function createEmptyBoard() {
                return Array.from({ length: ROWS }, () =>
                    Array(COLS).fill(null),
                );
            }
            function randomPiece(bag) {
                if (bag.length === 0) {
                    bag.push(...PIECE_TYPES);
                    for (let i = bag.length - 1; i > 0; i--) {
                        const j = Math.floor(Math.random() * (i + 1));
                        [bag[i], bag[j]] = [bag[j], bag[i]];

                return bag.pop();
            }
            function getShape(type, rot) {

            function createPiece(type) {

            function isValid(b, p) {
                const s = getShape(p.type, p.rotation);
                for (let r = 0; r < s.length; r++)
                    for (let c = 0; c < s[r].length; c++)
                        if (s[r][c]) {
                            const nx = p.x + c,
                                ny = p.y + r;

                                return false;
                            if (ny >= 0 && b[ny][nx] !== null) return false;
                        }
                return true;

            function placePiece(b, p) {
                const s = getShape(p.type, p.rotation);
                for (let r = 0; r < s.length; r++)
                    for (let c = 0; c < s[r].length; c++)
                        if (s[r][c]) {
                            const bx = p.x + c,
                                by = p.y + r;
                            if (by >= 0 && by < ROWS && bx >= 0 && bx < COLS)
                                b[by][bx] = p.type;
                        }
                return b;
            }
            function getCompletedLines(b) {
                const res = [];
                for (let r = 0; r < ROWS; r++)
                    if (b[r].every((c) => c !== null)) res.push(r);
                return res;
            }
            function removeLines(b, ls) {
                for (let i = 0; i < ls.length; i++) {
                    for (let r = ls[i]; r > 0; r--)
                        for (let c = 0; c < COLS; c++) b[r][c] = b[r - 1][c];
                    for (let c = 0; c < COLS; c++) b[0][c] = null;

            function tryRotate(b, p) {
                const nr = (((p.rotation + 1) % 4) + 4) % 4,

                if (p.type === "O") return isValid(b, rp) ? rp : null;
                const kicks =
                    p.type === "I"
                        ? SRS_I[p.rotation + "_" + nr]
                        : SRS_JLSTZ[p.rotation + "_" + nr];
                if (!kicks) return isValid(b, rp) ? rp : null;
                for (const [kx, ky] of kicks) {
                    const kp = { ...rp, x: rp.x + kx, y: rp.y + ky };
                    if (isValid(b, kp)) return kp;
                }
                // Senior Dev Fix: Floor Kick для I-фигуры
                if (p.type === "I") {

            let G = {

            try {

            function addScoreToLeaderboard(sc, lv, ln) {

            const boardCanvas = document.getElementById("boardCanvas"),

            const bonusPopup = document.getElementById("bonusPopup"),

            boardCanvas.width = BW;
            boardCanvas.height = BH;
            const boardCtx = boardCanvas.getContext("2d");
            function roundRect(ctx, x, y, w, h, radii) {
                let tl, tr, br, bl;
                if (Array.isArray(radii)) {
                    [tl, tr, br, bl] = radii;
                } else {
                    tl = tr = br = bl = radii;
                }
                ctx.beginPath();
                ctx.moveTo(x + tl, y);
                ctx.lineTo(x + w - tr, y);
                ctx.quadraticCurveTo(x + w, y, x + w, y + tr);
                ctx.lineTo(x + w, y + h - br);
                ctx.quadraticCurveTo(x + w, y + h, x + w - br, y + h);
                ctx.lineTo(x + bl, y + h);
                ctx.quadraticCurveTo(x, y + h, x, y + h - bl);
                ctx.lineTo(x, y + tl);
                ctx.quadraticCurveTo(x, y, x + tl, y);
                ctx.closePath();
            }
            function drawGlassCell(ctx, x, y, type, cellSize, isGhost) {
                const co = COLORS[type],
                    px = x * cellSize,
                    py = y * cellSize,
                    cs = cellSize,
                    r = 3;
                if (isGhost) {
                    ctx.save();
                    ctx.globalAlpha = 0.18;
                    ctx.fillStyle = co.base;
                    roundRect(ctx, px + 1, py + 1, cs - 2, cs - 2, r);
                    ctx.fill();
                    ctx.globalAlpha = 0.35;
                    ctx.strokeStyle = co.light;
                    ctx.lineWidth = 1;
                    roundRect(ctx, px + 1, py + 1, cs - 2, cs - 2, r);
                    ctx.stroke();
                    ctx.restore();
                    return;
                }
                ctx.save();
                const grad = ctx.createLinearGradient(px, py, px, py + cs);
                grad.addColorStop(0, co.light);
                grad.addColorStop(0.35, co.base);
                grad.addColorStop(0.7, co.mid);
                grad.addColorStop(1, co.dark);
                ctx.fillStyle = grad;
                roundRect(ctx, px + 0.5, py + 0.5, cs - 1, cs - 1, r);
                ctx.fill();
                ctx.strokeStyle = "rgba(255,255,255,0.25)";
                ctx.lineWidth = 1;
                roundRect(ctx, px + 1.5, py + 1.5, cs - 3, cs - 3, r - 0.5);
                ctx.stroke();
                const shineH = cs * 0.38;
                ctx.globalAlpha = 0.45;
                const shG = ctx.createLinearGradient(
                    px,
                    py,
                    px,
                    py + shineH,
                );
                shG.addColorStop(0, "rgba(255,255,255,0.7)");
                shG.addColorStop(1, "rgba(255,255,255,0)");
                ctx.fillStyle = shG;
                roundRect(ctx, px + 2, py + 2, cs - 4, shineH, [
                    r - 1,
                    r - 1,
                    0,
                    0,
                ]);
                ctx.fill();
                ctx.globalAlpha = 0.6;
                ctx.fillStyle = "#fff";
                ctx.beginPath();
                ctx.ellipse(
                    px + cs * 0.28,
                    py + cs * 0.22,
                    cs * 0.08,
                    cs * 0.05,
                    -0.3,
                    0,
                    Math.PI * 2,
                );
                ctx.fill();
                ctx.globalAlpha = 0.15;
                const sG = ctx.createLinearGradient(
                    px,
                    py + cs * 0.7,
                    px,
                    py + cs,

                sG.addColorStop(0, "rgba(0,0,0,0)");
                sG.addColorStop(1, "rgba(0,0,0,0.5)");

                    0,
                    0,
                    r - 1,
                    r - 1,
                ]);
                ctx.fill();
                ctx.globalAlpha = 0.08;
                ctx.shadowColor = co.base;
                ctx.shadowBlur = 8;
                ctx.fillStyle = co.base;

                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.globalAlpha = 1;
                ctx.restore();
            }
            function drawLockIndicator(ctx, col, row, cellSize) {
                const px = col * cellSize,

            const bgCanvas = document.createElement("canvas");
            bgCanvas.width = BW;

            function render() {
                if (!boardCtx) return;

                // 1. Draw background
                boardCtx.drawImage(bgCanvas, 0, 0);

                // 2. Calculate clear animation progress
                const nowMs = performance.now();
                let clearT = 0;
                if (G.clearingLineSet && G.clearingLineSet.size > 0)
                    clearT = Math.min(
                        (nowMs - G.removingStart) / CLEAR_DURATION,
                        1,
                    );

                // 3. Draw board cells
                for (let r = 0; r < ROWS; r++)
                    for (let c = 0; c < COLS; c++) {
                        if (G.board[r][c] !== null) {
                            if (
                                G.clearingLineSet &&
                                G.clearingLineSet.has(r)
                            ) {
                                // Animate: shrink + fade
                                boardCtx.save();
                                boardCtx.globalAlpha = 1 - clearT;
                                const sz = CELL * (1 - clearT * 0.5),
                                    scale = sz / CELL,
                                    cx = c * CELL + CELL / 2,
                                    cy = r * CELL + CELL / 2;
                                boardCtx.translate(cx, cy);
                                boardCtx.scale(scale, scale);
                                boardCtx.translate(-cx, -cy);
                                drawGlassCell(
                                    boardCtx,
                                    c,
                                    r,
                                    G.board[r][c],
                                    CELL,
                                    false,
                                );
                                boardCtx.restore();
                            } else {
                                drawGlassCell(
                                    boardCtx,
                                    c,
                                    r,
                                    G.board[r][c],
                                    CELL,
                                    false,
                                );
                            }
                        }
                    }

                // 4. Draw ghost piece
                if (G.currentPiece) {
                    const gy = G.cachedGhostY;
                    if (gy >= 0 && gy !== G.currentPiece.y) {
                        const s = getShape(
                            G.currentPiece.type,
                            G.currentPiece.rotation,
                        );
                        for (let r = 0; r < s.length; r++)
                            for (let c = 0; c < s[r].length; c++)
                                if (s[r][c] && gy + r >= 0)
                                    drawGlassCell(
                                        boardCtx,
                                        G.currentPiece.x + c,
                                        gy + r,
                                        G.currentPiece.type,
                                        CELL,
                                        true,
                                    );
                    }

                    // 5. Draw current piece
                    const s = getShape(
                        G.currentPiece.type,
                        G.currentPiece.rotation,
                    );
                    for (let r = 0; r < s.length; r++)
                        for (let c = 0; c < s[r].length; c++)
                            if (s[r][c] && G.currentPiece.y + r >= 0) {
                                drawGlassCell(
                                    boardCtx,
                                    G.currentPiece.x + c,
                                    G.currentPiece.y + r,
                                    G.currentPiece.type,
                                    CELL,
                                    false,
                                );
                                // 6. Lock delay indicator
                                if (G.lockDelayActive) {
                                    drawLockIndicator(
                                        boardCtx,
                                        G.currentPiece.x + c,
                                        G.currentPiece.y + r,
                                        CELL,
                                    );
                                }
                            }
                }

                // 7. Draw hard drop animation
                if (G.hdAnim) {
                    const elapsed = nowMs - G.hdAnim.startTime,
                        tVal = Math.min(elapsed / G.hdAnim.duration, 1),
                        easedT = tVal * tVal,
                        animY =
                            G.hdAnim.startY +
                            (G.hdAnim.endY - G.hdAnim.startY) * easedT,
                        s = getShape(
                            G.hdAnim.piece.type,
                            G.hdAnim.piece.rotation,
                        );
                    for (let r = 0; r < s.length; r++)
                        for (let c = 0; c < s[r].length; c++)
                            if (s[r][c] && animY + r >= 0) {
                                drawGlassCell(
                                    boardCtx,
                                    G.hdAnim.piece.x + c,
                                    animY + r,
                                    G.hdAnim.piece.type,
                                    CELL,
                                    false,
                                );
                            }
                }

                // 8. Draw particles
                if (partCount > 0) {
                    boardCtx.save();
                    boardCtx.globalCompositeOperation = "lighter";
                    for (let i = 0; i < partCount; i++) {
                        const ppx = partArr[i * 7],
                            ppy = partArr[i * 7 + 1],
                            psz = partArr[i * 7 + 2],
                            pr = partArr[i * 7 + 3] * 255,
                            pg = partArr[i * 7 + 4] * 255,
                            pb = partArr[i * 7 + 5] * 255,
                            pa = partArr[i * 7 + 6];
                        if (pa <= 0) continue;
                        boardCtx.globalAlpha = pa;
                        const colStr =
                            "rgb(" + (pr | 0) + "," + (pg | 0) + "," + (pb | 0) + ")";
                        boardCtx.fillStyle = colStr;
                        boardCtx.shadowColor = colStr;
                        boardCtx.shadowBlur = psz;
                        boardCtx.beginPath();
                        boardCtx.arc(ppx, ppy, psz, 0, Math.PI * 2);
                        boardCtx.fill();
                    }
                    boardCtx.restore();
                }

            function drawNext() {
                const ctx = nextCanvas.getContext("2d");
                if (!ctx) return;
                const ps = 18,
                    cw = nextCanvas.width,
                    ch = nextCanvas.height;
                const bgG = ctx.createLinearGradient(0, 0, 0, ch);
                bgG.addColorStop(0, "#0e0e18");
                bgG.addColorStop(1, "#0a0a10");
                ctx.fillStyle = bgG;
                ctx.fillRect(0, 0, cw, ch);
                if (!G.nextPiece) return;
                const s = getShape(G.nextPiece, 0);
                let minR = s.length,
                    maxR = 0,
                    minC = s[0].length,
                    maxC = 0;
                for (let r = 0; r < s.length; r++)
                    for (let c = 0; c < s[r].length; c++)
                        if (s[r][c]) {
                            minR = Math.min(minR, r);
                            maxR = Math.max(maxR, r);
                            minC = Math.min(minC, c);
                            maxC = Math.max(maxC, c);
                        }
                const ox = (cw - (maxC - minC + 1) * ps) / 2 - minC * ps,
                    oy = (ch - (maxR - minR + 1) * ps) / 2 - minR * ps;
                for (let r = 0; r < s.length; r++)
                    for (let c = 0; c < s[r].length; c++)
                        if (s[r][c]) {
                            const cx2 = ox + c * ps,
                                cy2 = oy + r * ps,
                                co = COLORS[G.nextPiece];
                            const grad = ctx.createLinearGradient(

                                cy2,

                            ctx.fillStyle = grad;

            function renderTitle() {
                const titleStr = t("title");

                    if (!map) {
